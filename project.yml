name: OditBridge
options:
  bundleIdPrefix: com.robi
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

# Signing identity, development team, and the local-install flag live in
# Configs/Common.xcconfig (with Configs/Local.xcconfig overriding for your
# personal setup). See README for details.
configFiles:
  Debug: Configs/Common.xcconfig
  Release: Configs/Common.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  OditBridge:
    type: application
    platform: macOS
    sources:
      - path: OditBridge
    configFiles:
      Debug: Configs/Common.xcconfig
      Release: Configs/Common.xcconfig
    postBuildScripts:
      - name: Install to /Applications (opt-in via ODIT_LOCAL_INSTALL)
        basedOnDependencyAnalysis: false
        script: |
          set -e
          if [ "$CONFIGURATION" != "Debug" ]; then
              exit 0
          fi
          if [ "$ODIT_LOCAL_INSTALL" != "YES" ]; then
              echo "Skipping /Applications install (set ODIT_LOCAL_INSTALL = YES in Configs/Local.xcconfig to enable)"
              exit 0
          fi
          DEST="/Applications/${PRODUCT_NAME}.app"
          rm -rf "$DEST"
          # Use ditto rather than cp -R: cp can drop the embedded code
          # signature on macOS, after which Gatekeeper refuses to launch the
          # installed bundle. ditto preserves all bundle metadata including
          # the _CodeSignature directory.
          ditto "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app" "$DEST"
          echo "Installed to $DEST"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robi.OditBridge
        PRODUCT_NAME: OditBridge
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OditBridge/Info.plist
        CODE_SIGN_ENTITLEMENTS: OditBridge/OditBridge.entitlements
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
