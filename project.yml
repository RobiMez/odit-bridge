name: OditBridge
options:
  bundleIdPrefix: com.robi
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

# Signing identity, development team, and the local-install flag live in
# Configs/Common.xcconfig (with Configs/Local.xcconfig overriding for your
# personal setup). See README for details.
configFiles:
  Debug: Configs/Common.xcconfig
  Release: Configs/Common.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  OditBridge:
    type: application
    platform: macOS
    sources:
      - path: OditBridge
    configFiles:
      Debug: Configs/Common.xcconfig
      Release: Configs/Common.xcconfig
    # No auto-install build phase: Xcode's late build phases (notably
    # RegisterWithLaunchServices) can strip the embedded signature off
    # the installed copy if the install runs as part of the build. Use
    # `tools/install-local.sh` after a build instead — see README.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robi.OditBridge
        PRODUCT_NAME: OditBridge
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OditBridge/Info.plist
        CODE_SIGN_ENTITLEMENTS: OditBridge/OditBridge.entitlements
        ENABLE_PREVIEWS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
